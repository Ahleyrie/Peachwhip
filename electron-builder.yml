appId: com.peachwhip.app
productName: Peachwhip
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
asarUnpack:
  - resources/**
win:
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-setup.${ext}
mac:
  target:
    - dmg
  category: public.app-category.entertainment
linux:
  target:
    - AppImage
  category: AudioVideo
# Self-update feed = GitHub Releases. CI publishes the installer + latest.yml to a
# release; the in-app updater reads the latest PUBLISHED (non-draft) release.
# Works keyless for a public repo. (If the repo goes private, auto-update would need
# a token or a switch to a generic/R2 feed.)
publish:
  provider: github
  owner: Ahleyrie
  repo: Peachwhip
